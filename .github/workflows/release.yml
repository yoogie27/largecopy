name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Create build directory
        run: mkdir build

      - name: Compile
        run: >
          cl.exe /nologo /std:c++20 /O2 /EHsc /W4 /WX
          /DWIN32_LEAN_AND_MEAN /DUNICODE /D_UNICODE /D_CRT_SECURE_NO_WARNINGS
          /I vendor
          /Fe:build\largecopy.exe
          /Fo:build\
          src\main.cpp src\args.cpp src\engine.cpp src\ledger.cpp
          src\hasher.cpp src\smb.cpp src\privilege.cpp src\console.cpp
          src\buffer_pool.cpp src\wan.cpp src\detect.cpp
          /link /SUBSYSTEM:CONSOLE ws2_32.lib iphlpapi.lib advapi32.lib mpr.lib

      - name: Smoke test
        run: build\largecopy.exe help

      - name: Sign exe (self-signed)
        continue-on-error: true
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=largecopy" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(1)

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" `
            -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match 'x64' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            Write-Host "::warning::signtool.exe not found, skipping signing"
            exit 0
          }

          & $signtool.FullName sign `
            /sha1 $cert.Thumbprint `
            /fd SHA256 `
            /t http://timestamp.digicert.com `
            build\largecopy.exe

          Write-Host "Signed with thumbprint: $($cert.Thumbprint)"

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Path build\largecopy.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  largecopy.exe" | Out-File -Encoding ascii -NoNewline build\largecopy.exe.sha256
          Write-Host "SHA-256: $hash"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build\largecopy.exe
            build\largecopy.exe.sha256

      - name: Update Scoop manifest
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $hash = (Get-FileHash -Path build\largecopy.exe -Algorithm SHA256).Hash.ToLower()
          $url = "https://github.com/${{ github.repository }}/releases/download/${tag}/largecopy.exe"

          $manifest = Get-Content scoop/largecopy.json -Raw | ConvertFrom-Json
          $manifest.version = $version
          $manifest.url = $url
          $manifest.hash = "sha256:$hash"
          $manifest | ConvertTo-Json -Depth 10 | Set-Content scoop/largecopy.json -Encoding utf8

          Write-Host "Updated Scoop manifest: v$version hash=$hash"

      - name: Commit Scoop manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add scoop/largecopy.json
          git diff --cached --quiet || (git commit -m "scoop: update manifest for ${{ github.ref_name }}" && git push origin main)
